<div class="page">
  <div class="header">
    <h1>Mis conversaciones</h1>
    <p class="sub">Haz una pregunta y recibe respuestas de todas las IAs al mismo tiempo</p>
  </div>

  <!-- Crear nueva -->
  <div class="nueva-conv">
    <input
      type="text"
      [(ngModel)]="nuevoTitulo"
      placeholder="Nombre de la conversación (ej: Resumen de historia)"
      (keyup.enter)="crear()"
      class="input-titulo"
    />
    <button class="btn-crear" (click)="crear()" [disabled]="creando">
      <span *ngIf="!creando">+ Nueva</span>
      <app-loading *ngIf="creando" [pequeno]="true"></app-loading>
    </button>
  </div>

  <div class="error-msg" *ngIf="error">{{ error }}</div>

  <app-loading *ngIf="cargando" texto="Cargando conversaciones..."></app-loading>

  <div *ngIf="!cargando && conversaciones.length === 0" class="empty">
    <div class="empty-icon">💬</div>
    <p>Aún no tienes conversaciones. ¡Crea una para empezar!</p>
  </div>

  <div class="lista" *ngIf="!cargando && conversaciones.length > 0">
    <div class="conv-card" *ngFor="let conv of conversaciones" (click)="abrir(conv.id)">
      <div class="conv-info">
        <span class="conv-titulo">{{ conv.titulo }}</span>
        <span class="conv-fecha">{{ formatFecha(conv.fechaUltimaActividad || conv.fechaCreacion) }}</span>
      </div>
      <div class="conv-actions">
        <span class="ia-badge">6 IAs</span>
        <button class="btn-eliminar" (click)="eliminar($event, conv.id)" title="Eliminar">🗑</button>
      </div>
    </div>
  </div>
</div>
